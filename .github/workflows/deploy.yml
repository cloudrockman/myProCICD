name: CI/CD Pipeline

on:
  push:
    branches:
      - main   # Trigger on pushes to main branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run tests
        run: |
          echo "Run unit tests here"
          # e.g., pytest, npm test, etc.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            rm -rf ~/temp-deploy && mkdir ~/temp-deploy
            git clone https://github.com/cloudrockman/myProCICD.git ~/temp-deploy
            sudo rsync -av --delete --exclude 'uploads/' ~/temp-deploy/* /var/www/html/
            sudo systemctl restart apache2